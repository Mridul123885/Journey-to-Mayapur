name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build signed APK and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK (command-line tools only, no Android Studio)
        uses: android-actions/setup-android@v3

      - name: Install exact npm dependencies from package.json
        # Uses "npm install" (not "npm ci") because this repo does not ship a
        # package-lock.json. All Capacitor versions in package.json are pinned
        # to exact numbers (no ^ or ~), so this always installs precisely the
        # @capacitor/android version declared in package.json — never "latest".
        run: npm install

      - name: Sync the web app + plugins into the Android project
        run: npx cap sync android

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build release APK
        working-directory: android
        env:
          CI_KEYSTORE_PATH: release.keystore
          CI_KEYSTORE_PASSWORD: journeyMayapur2026
          CI_KEY_ALIAS: journeykey
          CI_KEY_PASSWORD: journeyMayapur2026
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Build release AAB (Android App Bundle)
        working-directory: android
        env:
          CI_KEYSTORE_PATH: release.keystore
          CI_KEYSTORE_PASSWORD: journeyMayapur2026
          CI_KEY_ALIAS: journeykey
          CI_KEY_PASSWORD: journeyMayapur2026
        run: gradle :app:bundleRelease --no-daemon --stacktrace

      - name: Locate build outputs
        run: |
          echo "APK:"
          find android/app/build/outputs/apk -name "*.apk"
          echo "AAB:"
          find android/app/build/outputs/bundle -name "*.aab"

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk dist/app-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab dist/app-release.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: dist/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: dist/app-release.aab
